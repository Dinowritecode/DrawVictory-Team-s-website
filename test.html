<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="javascript/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="crooper/cropper.min.css">
    <script src="crooper/cropper.min.js"></script>
    <style>
        .inpuFile{
    display: none;
}
    </style>
</head>
<body>
        <!-- 1.一个用于获取上传文件的input，type="file"，并且监听onchange事件  -->
        <input 
        type="file"     
        accept="image/*" 
        id="imgReader" 
        onchange="loadingImg"
        > 
 
    <!-- 2.一个用于给Cropper.js覆盖使用的img  -->
    <img id="cropImg">
    
    <!-- 3.两个用于预览的div  -->
    <div class="previewText">裁剪预览</div>
    <div class="previewBox"></div>
    <div class="previewBoxRound"></div>
    <script>
            function uploadImg(){
            document.querySelector('#imgReader').click()
    }
    </script>
</body>
</html>
